---

# ZeroClaw Docker Compose Example
#
# Quick start:
#   1. Copy this file and set your API key
#   2. Run: docker compose up -d
#   3. Access gateway at http://localhost:42617
#
# For more info: https://github.com/zeroclaw-labs/zeroclaw

services:
  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    container_name: zeroclaw
    restart: unless-stopped

    command: ["gateway", "--host", "0.0.0.0"]

    environment:
      - API_KEY=${API_KEY:-}
      - PROVIDER=${PROVIDER:-openrouter}
      - ZEROCLAW_PROVIDER=${ZEROCLAW_PROVIDER:-openrouter}
      - ZEROCLAW_MODEL=${ZEROCLAW_MODEL:-openrouter/free}
      - ZEROCLAW_ALLOW_PUBLIC_BIND=true
      - ZEROCLAW_GATEWAY_PORT=${ZEROCLAW_GATEWAY_PORT:-42617}

    volumes:
      - ./data:/zeroclaw-data

    ports:
      - "${HOST_PORT:-42617}:${ZEROCLAW_GATEWAY_PORT:-42617}"

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    healthcheck:
      test: ["CMD", "zeroclaw", "status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - traefik

    labels:
      traefik.enable: true
      traefik.http.services.zeroclaw.loadbalancer.server.port: 42617

      # allow http trafic on local server
      traefik.http.routers.zeroclaw-http.entrypoints: web
      traefik.http.routers.zeroclaw-http.rule: Host(`zeroclaw.localhost`)

      # https configuration
      traefik.http.routers.zeroclaw-https.entrypoints: websecure
      traefik.http.routers.zeroclaw-https.rule: Host(`zeroclaw.localhost`)
      traefik.http.routers.zeroclaw-https.middlewares: security@file, compression@file
      traefik.http.routers.zeroclaw-https.tls: true

networks:
  traefik:
    external: true
